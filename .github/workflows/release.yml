name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify manifest version matches tag
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          MANIFEST=$(node -p "JSON.parse(require('fs').readFileSync('apps/integration/custom_components/cardinal/manifest.json','utf8')).version")
          if [ "$TAG" != "$MANIFEST" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match manifest version $MANIFEST"
            echo "Update apps/integration/custom_components/cardinal/manifest.json before tagging."
            exit 1
          fi
          echo "Version $MANIFEST confirmed."

      - name: Run CI checks
        run: |
          pnpm lint
          pnpm type-check
          pnpm test

      - name: Build release package
        run: pnpm package

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/cardinal-*.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
